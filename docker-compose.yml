version: "3.9"

services:
  mysql:
    image: mysql:8.1
    container_name: studyolle-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studyolle
      MYSQL_USER: studyolle
      MYSQL_PASSWORD: studyolle
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: studyolle-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
#    build: .
    image: lhr5767/studyolle:latest
    container_name: studyolle-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/studyolle?serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: studyolle
      SPRING_DATASOURCE_PASSWORD: studyolle
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    profiles: ["dev"] # 배포할때만 컨테이너로 띄움

  nginx:
#    build: ./nginx
    image: lhr5767/studyolle-nginx:latest
    container_name: studyolle-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    profiles: ["dev"]

#로컬에 데이터 안남기고 docker가 데이터 관리하도록 named volume 사용
volumes:
  mysql_data:
  redis_data: