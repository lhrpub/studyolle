<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments.html :: head"></head>

<body>

<div th:replace="fragments.html :: main-nav"></div>
<div th:replace="fragments.html :: study-banner"></div>
<div class="container">
  <div th:replace="fragments.html :: study-info"></div>
  <div th:replace="fragments.html :: study-menu(studyMenu='chat')"></div>

  <div th:replace="fragments.html :: study-chat"></div>

  <div th:replace="fragments.html :: footer"></div>
</div>

<script th:replace="fragments.html :: tooltip"></script>


<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script th:inline="javascript">

  let studyId = [[${study.id}]];
  let senderId = [[${account.id}]];
  let senderName = [[${account.nickname}]];

  let stompClient = null;

  function loadChatHistory(){
    fetch("/api/chat/" + studyId)
      .then(res => res.json())
      .then(data => {
              data.forEach(msg => {
                renderMessage(msg);
            });
        });
  }

  function connect() {

    const socket = new SockJS('/ws');
    stompClient = Stomp.over(socket);

    stompClient.connect({}, function () {
        stompClient.subscribe('/topic/study/' + studyId, function (msg) {
            const data = JSON.parse(msg.body);
            renderMessage(data);
        });
    });
  }

  function renderMessage(data) {

    const box = document.getElementById("chat-box");

    const messageWrapper = document.createElement("div");
    messageWrapper.classList.add("chat-message");

    const container = document.createElement("div");
    container.classList.add("message-container");

    const bubble = document.createElement("div");
    bubble.classList.add("chat-bubble");
    bubble.textContent = data.message; // XSS 방지

    if (data.senderId === senderId) {

        messageWrapper.classList.add("mine");
        container.appendChild(bubble);

    } else {

        messageWrapper.classList.add("other");

        const senderDiv = document.createElement("div");
        senderDiv.classList.add("sender");
        senderDiv.textContent = data.senderName;

        container.appendChild(senderDiv);
        container.appendChild(bubble);
    }
    messageWrapper.appendChild(container);
    box.appendChild(messageWrapper);
    box.scrollTop = box.scrollHeight;
  }

  function sendMessage() {

    const input = document.getElementById("message");
    const message = input.value.trim();

    if (message === "") return;

    stompClient.send("/app/chat.send", {}, JSON.stringify({
        studyId: studyId,
        senderId: senderId,
        senderName: senderName,
        message: message
    }));

    input.value = "";
  }

  document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
  });

  loadChatHistory();
  connect();

</script>

</body>
</html>
